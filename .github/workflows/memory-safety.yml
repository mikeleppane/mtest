name: Memory safety

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  asan:
    name: ASan + LSan exec canary
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          locked: true
          cache: true

      - name: Tool provenance
        run: |
          pixi run mojo-version
          pixi run clang --version
          ldd --version | head -1

      - name: Build prerequisite
        run: pixi run build

      - name: Run ASan and LSan
        run: pixi run asan-check

      - name: Upload ASan logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asan-logs
          path: build/safety/asan/*.log
          if-no-files-found: warn
          retention-days: 30

  valgrind:
    name: Valgrind Memcheck exec gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          locked: true
          cache: true

      - name: Install glibc debug symbols
        run: |
          # Approved second network phase, scoped to scheduled/manual Memcheck.
          libc_version="$(dpkg-query -W -f='${Version}' libc6)"
          echo "preinstalled libc6 $libc_version"
          sudo apt-get update
          apt-cache policy libc6-dbg
          sudo apt-get install --yes --no-install-recommends "libc6-dbg=$libc_version"
          installed_libc_version="$(dpkg-query -W -f='${Version}' libc6)"
          debug_version="$(dpkg-query -W -f='${Version}' libc6-dbg)"
          test "$installed_libc_version" = "$libc_version"
          test "$debug_version" = "$libc_version"
          echo "libc6/libc6-dbg $libc_version"

      - name: Tool provenance
        run: |
          pixi run mojo-version
          pixi run clang --version
          pixi run valgrind --version
          ldd --version | head -1

      - name: Build prerequisite
        run: pixi run build

      - name: Run Valgrind Memcheck
        run: pixi run valgrind-check

      - name: Upload Valgrind logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-logs
          path: build/safety/valgrind/*.log
          if-no-files-found: warn
          retention-days: 30
