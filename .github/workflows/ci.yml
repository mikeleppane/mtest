name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# A newer push to the same branch/PR cancels the older, still-running job.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The default token only needs to read the repo.
permissions:
  contents: read

jobs:
  ci:
    name: fmt + transcripts + tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          # Install exactly what pixi.lock pins; fail if the lock is stale. This
          # is the ONLY network step — everything after is hermetic (the
          # fixtures and transcripts are committed; the generator builds and
          # runs the fixtures with the locked toolchain).
          locked: true
          # Cache the solved environment keyed on pixi.lock.
          cache: true

      - name: Mojo version
        run: pixi run mojo-version

      # The aggregate gate, fail-fast in order:
      #   fmt-check         — mojo format then `git diff --exit-code` (never edits in CI)
      #   harness-check     — exercise recursive suite enumeration and output mapping
      #   safety-check      — reject undocumented unsafe Mojo operations
      #   postfork-check    — audit the production/testing post-fork call graphs
      #   native-check      — verify native ABI/layout/symbol isolation and lifecycle
      #   build             — precompile src/mtest (the package-compiles gate)
      #   transcripts-check — regenerate every transcript to a temp dir and diff
      #                       byte-for-byte against committed protocol snapshots (also a
      #                       toolchain-drift detector via the pinned header)
      #   test-direct       — build each classified suite and EXECUTE the binary
      #                       directly (never `mojo run`, which masks crash codes)
      #   test              — dogfood mtest over the same exact path inventory
      #   e2e               — assert exact CLI exit codes and console structure
      # No network is touched here.
      - name: CI gate
        run: pixi run ci

  package:
    name: linux-64 packaged-artifact gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          locked: true
          cache: true

      - name: Mojo version
        run: pixi run mojo-version

      # The packaged-artifact consumption gate: build the recipe into a LOCAL
      # conda channel, install it into a fresh scratch env FROM THAT LOCAL
      # CHANNEL, loader-clean probe the installed binary, run mtest's own
      # suite through the installed binary, then a tarball fallback-format
      # smoke-run. Nothing uploads, publishes, or authenticates anywhere.
      # linux-64 only (the maintainer's ruling) — standalone from `pixi run
      # ci`, not wired into the job above; macOS packaging stays a documented
      # ceiling this phase, so the macos-build lane below is untouched.
      - name: Package check
        run: pixi run package-check

  macos-build:
    name: macOS arm64 build + link
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          locked: true
          cache: true

      - name: Mojo version
        run: pixi run mojo-version

      - name: Audit post-fork call graph
        run: pixi run postfork-check

      - name: Precompile package
        run: pixi run build

      - name: Link executable
        run: pixi run build-bin

      - name: Smoke-test executable
        run: ./build/mtest --help
