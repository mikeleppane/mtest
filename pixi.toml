[workspace]
name = "mtest"
version = "0.4.0"
description = "A pytest-like test runner for Mojo that orchestrates the stdlib's per-file TestSuite"
channels = ["https://conda.modular.com/max/", "conda-forge"]
# Linux and macOS are gate targets and share the POSIX process surface the
# runner depends on. Bumping the platform set is an Ask-first decision; the
# Linux-only protocol snapshots are stamped with os/arch, so regenerating them
# on a foreign platform diffs loudly by design.
platforms = ["linux-64", "osx-arm64"]

[dependencies]
# The toolchain IS the oracle: the protocol snapshots pin TestSuite's behavior
# at exactly this Mojo version, and the version appears in every transcript
# header. Bumping mojo is an Ask-first decision (CI must match local; a bump can
# silently change valid syntax AND the pinned protocol — regenerate transcripts
# and read the diff as the changelog). See AGENTS.md.
mojo = "==1.0.0b2,<2"
# Python is a BUILD-TIME tool only — the transcript generator and check scripts
# live under scripts/ and use nothing but the standard library. The runner
# itself is pure Mojo with ZERO runtime dependencies; there is no
# [pypi-dependencies] section on purpose.
python = "3.12.*"
# The POSIX adapter is a build-time C object linked into Mojo executables. Pin
# one compiler on both supported targets so its ABI and sanitizer behavior are
# reproducible; the linked object adds no runtime library dependency.
clang = "==18.1.8"
# The JUnit report gate needs a schema validator. xmllint (from libxml2) checks
# the vendored junit-10.xsd against the shipped artifact directly; pinned so the
# gate's accept/reject verdict cannot drift with an unpinned system copy.
libxml2 = "==2.15.3"
# Builds recipe/recipe.yaml into a local conda channel (build-time packaging
# tool only; the shipped mtest binary has zero dependency on it). Pinned exact
# so the recipe's proven isolated-build-env behavior cannot drift with an
# unpinned rattler-build release.
rattler-build = "==0.69.1"

[tasks]
# Print the pinned Mojo version — first CI step, fails fast on a broken toolchain
# and stamps the exact build into the log next to the transcript headers.
mojo-version = "mojo --version"

# Assert MTEST_VERSION (src/mtest/cli/parser.mojo) and this manifest's `version`
# agree with each other and with the version this repo currently ships. Cheap
# and dependency-free, so it runs first — a drift here means every later gate
# (goldens, packaging) would be validating a lie about which release they cover.
version-check = "python scripts/version_check.py"

# Precompile the src/mtest package into build/mtest.mojopkg. This is the
# package-compiles GATE: an empty-but-broken package fails here before any test
# does. `mojo package` does not exist in 1.0.0b2 — only `mojo precompile`, which
# produces the same artifact.
build = "bash scripts/build_pkg.sh"

# Compile the exec-private C adapter to the one production object linked into
# every Mojo executable that can instantiate mtest.exec. The ABI checker proves
# the test-only fault/sanitizer controls are absent from this artifact.
build-native = "python scripts/build_native.py"

# Link the runnable binary at build/mtest from src/main.mojo. Depends on `build`
# so the package is precompiled to build/mtest.mojopkg FIRST — `-I build`
# resolves `from mtest... import` against that artifact (the same include the
# test runner uses), so main compiles against a binary dependency, not the whole
# source tree. This is the first artifact a human can actually run.
build-bin = { cmd = "mojo build -I build src/main.mojo -o build/mtest -Xlinker build/native/mtest_exec_native.o", depends-on = [
    "build",
    "build-native",
] }

# Build recipe/recipe.yaml into a LOCAL conda channel: rattler-build solves an
# isolated build env (mojo ==1.0.0b2 + the C toolchain, from the modular +
# conda-forge channels), builds mtest FROM SOURCE inside that sandbox (mirroring
# build -> build-native -> build-bin), and writes the resulting .conda under
# build/conda-channel — a plain directory with repodata.json, nothing uploaded
# or published anywhere. Not wired into `pixi run ci`; the dedicated Linux
# package job runs independently from both platform test chains.
package-build = "rattler-build build --recipe recipe/recipe.yaml -c https://conda.modular.com/max/ -c conda-forge --output-dir build/conda-channel"

# The packaged-artifact consumption GATE: build -> install the .conda into a
# FRESH scratch env from the local channel (proving it pulls mojo-compiler
# ==1.0.0b2) -> a loader-clean probe on the INSTALLED binary (dev pixi env
# absent from PATH, empty LD_LIBRARY_PATH) -> mtest's own suite run through
# that installed binary with the toolchain threaded so its build children can
# still resolve mojo -> a tar-bz2 fallback-format install + smoke-run. Depends
# on build + build-native (not build-bin) so this repo's own build/mtest.mojopkg
# and the test-variant native object exist for the suite run — the binary under
# test is the INSTALLED one, never build/mtest. Standalone: NOT wired into
# `pixi run ci`; its dedicated Linux CI job is independent. Nothing uploads or
# publishes anywhere.
package-check = { cmd = "python scripts/package_check.py", depends-on = [
    "build",
    "build-native",
] }

# Rewrite Mojo files in place — run locally before committing. Protocol fixtures
# live beneath tests/, so this covers the runner, fixtures, and suites.
fmt = "mojo format src tests e2e"
# CI gate: format, then fail if anything changed (never edits in CI). A format
# that shifts a fixture's `At <path>:<line>:<col>` coordinates is an oracle-side
# change — regenerate transcripts, do not fight the gate.
fmt-check = "mojo format src tests e2e && git diff --exit-code"

# Stdlib-only unsafe-operation inventory. Mutation tests pin every syntax family
# and string/comment exclusion; the complete product/test inventory must remain
# locally documented before the ordinary CI gate can proceed.
safety-check = "python scripts/safety_check_test.py && python scripts/safety_check.py"

# Recurring Clang call-graph audit for the complete post-fork child region.
# Mutation tests prove forbidden direct, wrapped, and indirect calls fail closed;
# both production and testing preprocessing variants must match the exact
# platform allowlist.
postfork-check = "python scripts/postfork_check_test.py && python scripts/postfork_check.py"

# Strict C17 ABI/layout/symbol verification plus native lifecycle tests for the
# private exec adapter. The standalone post-fork audit is a prerequisite. This
# remains separate from the Mojo suite so the test object can expose deterministic
# fault and sanitizer controls that production linkage proves absent.
native-check = { cmd = "python scripts/native_check_test.py && python scripts/native_check.py", depends-on = [
    "postfork-check",
] }

# Source-build the native adapter and a risk-weighted exec subset with matching
# AddressSanitizer instrumentation. Live OOB/UAF/leak controls prove that both
# the compiler instrumentation and fail-closed harness remain effective.
asan-check = "python scripts/asan_check.py"

# Source-build every exec integration suite with debug information and run it
# under the locked Linux-only Memcheck binary. Undefined-value, invalid-access,
# leak, and fd controls run first; reviewed runtime-reachable allocations are
# matched exactly and project/native frames are forbidden from that baseline.
# The unified CI workflow's Valgrind cell has a narrow approved apt exception
# for the exact debug-symbol version matching the runner's preinstalled glibc;
# no other source/test/memory step has that exception, and this task is not
# hermetic. The independent package job has its own external-channel contract.
valgrind-check = "python scripts/valgrind_check_test.py && python scripts/valgrind_check.py"

# Gate the JUnit report tooling ahead of the renderer that will use it: recorded
# unit tests first prove the checker actually rejects a broken artifact, then
# the checker runs xmllint against the vendored junit-10.xsd plus the
# arithmetic/structural invariants the schema cannot express over the
# committed byte-faithful mock.
junit-check = "python scripts/junit_check_test.py && python scripts/junit_check.py"

# Gate mtest's OWN rendered JUnit document through the same junit-10 oracle:
# build and run scripts/junit_emit.mojo (which drives the real JunitReporter
# over every sentinel-matrix cell), then run the schema + arithmetic checker over
# the emitted document and confirm a tampered copy is rejected. Depends on the
# precompiled package so the emitter can import mtest.report. This validates the
# shipped renderer's bytes, complementing junit-check's mock and the Mojo unit
# tests that pin the renderer structure directly.
junit-render-check = { cmd = "python scripts/junit_render_check.py", depends-on = [
    "build",
] }

# Regenerate the protocol snapshots IN PLACE from the committed fixtures at the
# pinned toolchain. Local use only (updating the committed snapshots); never run in
# CI. The generator self-verifies (hard asserts) before writing.
transcripts = "python scripts/gen_transcripts.py"
# CI gate: regenerate every transcript into a temp dir and diff byte-for-byte
# against tests/snapshots/protocol/ (MANIFEST included) — byte-identical or red. This
# is the protocol pin: a red diff after a repo change indicts THE CHANGE; a red
# diff after a mojo re-pin is the protocol changelog. Hermetic.
transcripts-check = "bash scripts/transcripts_check.sh"

# The INDEPENDENT glob-driven twin: builds the package first (fail-fast), then
# BUILDS each unit/integration test_*.mojo and EXECUTES the binary directly, one process per
# file, with no mtest involved. `mojo run` never appears in the gate — it masks
# crash exit codes to 1 and can JIT-crash in CI (#6413). The repo eats the same
# build-then-execute rule the runner enforces. Kept in `ci` alongside `test` (the
# dogfood run below) as an mtest-independent oracle: if the two ever disagree on
# outcome, that disagreement is a self-hosting bug in mtest, not noise.
test-direct = "bash scripts/test_all.sh tests/unit tests/integration"
test-unit = "bash scripts/test_all.sh tests/unit"
test-integration = "bash scripts/test_all.sh tests/integration"

# Focused stdlib-only proof that the direct-suite watchdog preserves normal
# statuses and cleans up a timed-out process group.
process-watchdog-check = "python scripts/process_watchdog_test.py"

# Fast self-tests for repository harness behavior. Uses disposable test inputs
# and a fake compiler to prove recursive root selection and injective binary
# paths without rebuilding the full Mojo suite.
harness-check = "python scripts/harness_check.py"

# DOGFOOD gate: run mtest over its OWN tests/ suite, executing the built binary
# directly (`build/mtest -I build -I tests/support tests/` — never `mojo run`, for the same
# crash-exit-code reason as test-direct). Depends on build-bin so build/mtest and
# the precompiled package both exist. `scripts/self_host_check.py` runs the
# binary, propagates its exit code (the suite must PASS through mtest), and
# checks COMPLETENESS independently of mtest: it walks the classified suite roots
# (without asking mtest) and fails if that count disagrees with the file count
# mtest reported selecting — proof mtest discovered every test file and silently
# skipped none. This is an ADDITIONAL gate beside test-direct, never a
# replacement: both run the same built binaries, so their outcomes must agree.
[tasks.test]
cmd = "python scripts/self_host_check.py"
depends-on = ["build-bin"]

# End-to-end gate: build the runnable binary, then drive it against the committed
# known-outcome tree under e2e/ (via e2e/manifest.json, the single
# source of expectations) asserting exact exit codes and structural console
# output. Depends on build-bin so build/mtest exists. Runs under `pixi run`, so
# the spawned binary inherits the pixi env with `mojo` on PATH — the per-file
# `mojo build` children need it. The harness stdlib-only Python; every subprocess
# spawn is hard-timeout-guarded so a runner hang can never wedge CI.
[tasks.e2e]
cmd = "python scripts/e2e_check.py"
depends-on = ["build-bin"]

# The cheap hosted-CI release barrier. Every non-behavioral member of the local
# floor stays in its exact fail-fast order; GitHub releases the independent
# behavioral and memory-safety lanes only after this aggregate passes.
[tasks.ci-preflight]
depends-on = [
    "version-check",
    "fmt-check",
    "harness-check",
    "safety-check",
    "postfork-check",
    "native-check",
    "junit-check",
    "build",
    "junit-render-check",
    "transcripts-check",
]

# The canonical serial local floor. Hosted CI runs the exact preflight above,
# then gives each independent behavioral gate a fresh parallel matrix cell;
# local development keeps one ordered aggregate for reproducible handoff.
[tasks.ci]
depends-on = [
    "ci-preflight",
    "test-direct",
    "test",
    "e2e",
]

[target.linux-64.dependencies]
valgrind = "==3.27.1"
