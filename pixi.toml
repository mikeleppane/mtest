[workspace]
name = "mtest"
version = "0.1.0"
description = "A pytest-like test runner for Mojo that orchestrates the stdlib's per-file TestSuite"
channels = ["https://conda.modular.com/max/", "conda-forge"]
# Linux is the gate platform; macOS is a v1 target and shares the same POSIX
# process surface the runner depends on. Bumping the platform set is an
# Ask-first decision — the transcript goldens are stamped with os/arch and a
# regeneration on a foreign platform diffs loudly by design.
platforms = ["linux-64", "osx-arm64"]

[dependencies]
# The toolchain IS the oracle: the golden transcripts pin TestSuite's behavior
# at exactly this Mojo version, and the version appears in every transcript
# header. Bumping mojo is an Ask-first decision (CI must match local; a bump can
# silently change valid syntax AND the pinned protocol — regenerate transcripts
# and read the diff as the changelog). See AGENTS.md.
mojo = "==1.0.0b2,<2"
# Python is a BUILD-TIME tool only — the transcript generator and check scripts
# live under scripts/ and use nothing but the standard library. The runner
# itself is pure Mojo with ZERO runtime dependencies; there is no
# [pypi-dependencies] section on purpose.
python = "3.12.*"

[tasks]
# Print the pinned Mojo version — first CI step, fails fast on a broken toolchain
# and stamps the exact build into the log next to the transcript headers.
mojo-version = "mojo --version"

# Precompile the src/mtest package into build/mtest.mojopkg. This is the
# package-compiles GATE: an empty-but-broken package fails here before any test
# does. `mojo package` does not exist in 1.0.0b2 — only `mojo precompile`, which
# produces the same artifact.
build = "bash scripts/build_pkg.sh"

# Link the runnable binary at build/mtest from src/main.mojo. Depends on `build`
# so the package is precompiled to build/mtest.mojopkg FIRST — `-I build`
# resolves `from mtest... import` against that artifact (the same include the
# test runner uses), so main compiles against a binary dependency, not the whole
# source tree. This is the first artifact a human can actually run.
build-bin = { cmd = "mojo build -I build src/main.mojo -o build/mtest", depends-on = [
    "build",
] }

# Rewrite Mojo files in place — run locally before committing. Covers the runner
# package, the probe fixtures, and the tests.
fmt = "mojo format src fixtures tests"
# CI gate: format, then fail if anything changed (never edits in CI). A format
# that shifts a fixture's `At <path>:<line>:<col>` coordinates is an oracle-side
# change — regenerate transcripts, do not fight the gate.
fmt-check = "mojo format src fixtures tests && git diff --exit-code"

# Regenerate the golden transcripts IN PLACE from the committed fixtures at the
# pinned toolchain. Local use only (updating the committed goldens); never run in
# CI. The generator self-verifies (hard asserts) before writing.
transcripts = "python scripts/gen_transcripts.py"
# CI gate: regenerate every transcript into a temp dir and diff byte-for-byte
# against goldens/transcripts/ (MANIFEST included) — byte-identical or red. This
# is the protocol pin: a red diff after a repo change indicts THE CHANGE; a red
# diff after a mojo re-pin is the protocol changelog. Hermetic.
transcripts-check = "bash scripts/transcripts_check.sh"

# The INDEPENDENT glob-driven twin: builds the package first (fail-fast), then
# BUILDS each unit/integration test_*.mojo and EXECUTES the binary directly, one process per
# file, with no mtest involved. `mojo run` never appears in the gate — it masks
# crash exit codes to 1 and can JIT-crash in CI (#6413). The repo eats the same
# build-then-execute rule the runner enforces. Kept in `ci` alongside `test` (the
# dogfood run below) as an mtest-independent oracle: if the two ever disagree on
# outcome, that disagreement is a self-hosting bug in mtest, not noise.
test-direct = "bash scripts/test_all.sh tests/unit tests/integration"
test-unit = "bash scripts/test_all.sh tests/unit"
test-integration = "bash scripts/test_all.sh tests/integration"

# Fast self-tests for repository harness behavior. Uses disposable test inputs
# and a fake compiler to prove recursive root selection and injective binary
# paths without rebuilding the full Mojo suite.
harness-check = "python scripts/harness_check.py"

# DOGFOOD gate: run mtest over its OWN tests/ suite, executing the built binary
# directly (`build/mtest -I build -I tests/support tests/` — never `mojo run`, for the same
# crash-exit-code reason as test-direct). Depends on build-bin so build/mtest and
# the precompiled package both exist. `scripts/self_host_check.py` runs the
# binary, propagates its exit code (the suite must PASS through mtest), and
# checks COMPLETENESS independently of mtest: it walks the classified suite roots
# (without asking mtest) and fails if that count disagrees with the file count
# mtest reported selecting — proof mtest discovered every test file and silently
# skipped none. This is an ADDITIONAL gate beside test-direct, never a
# replacement: both run the same built binaries, so their outcomes must agree.
[tasks.test]
cmd = "python scripts/self_host_check.py"
depends-on = ["build-bin"]

# End-to-end gate: build the runnable binary, then drive it against the committed
# known-outcome tree under testdata/ (via testdata/manifest.json, the single
# source of expectations) asserting exact exit codes and structural console
# output. Depends on build-bin so build/mtest exists. Runs under `pixi run`, so
# the spawned binary inherits the pixi env with `mojo` on PATH — the per-file
# `mojo build` children need it. The harness stdlib-only Python; every subprocess
# spawn is hard-timeout-guarded so a runner hang can never wedge CI.
[tasks.e2e]
cmd = "python scripts/e2e_check.py"
depends-on = ["build-bin"]

# The aggregate gate CI runs. Ordered fail-fast: formatting, then the package
# compile gate, then the protocol-transcript diff, then the Mojo tests (the
# mtest-independent glob-driven twin first, then mtest dogfooding its own
# suite), then the end-to-end binary gate.
[tasks.ci]
depends-on = [
    "fmt-check",
    "harness-check",
    "build",
    "transcripts-check",
    "test-direct",
    "test",
    "e2e",
]
